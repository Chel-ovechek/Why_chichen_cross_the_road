<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WhyChichenCrossTheRoad</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="header">
            <img id="gameIcon" src="Chicken.png" alt="icon">
            <h1 id="title">Почему курица переходит дорогу?</h1>
            <img id="accountImage" src="ava_Монтажная область 1-01.png" alt="user"> <!-- Добавьте заглушку картинки -->
        </div>

        <div id="gameBoard">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="mobileControls">
            <button class="ctrl-btn" id="btnUp">▲</button>
            <div class="ctrl-row">
                <button class="ctrl-btn" id="btnLeft">◀</button>
                <button class="ctrl-btn" id="btnDown">▼</button>
                <button class="ctrl-btn" id="btnRight">▶</button>
            </div>
        </div>

        <div id="levelNumber">УРОВЕНЬ 1</div> <!-- Текст внутри -->

        <div id="footer">
            <div id="contacts">Контакты: @mygame</div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
